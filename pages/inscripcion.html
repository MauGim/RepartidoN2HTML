<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Expo Joven</title>
</head>
<body>
    <header>
        <h1>Formulario de inscripción</h1>
        <h2>Completa el siguiente formulario para inscribirte en nuestros talleres</h2>
        </header>
         <main>
        <section>
            <form action="">
                <label for="nombre">Nombre:</label><br>
                <input type="text" id="nombre" name="nombre" required><br> 
                
                <label for="apellido">Apellido:</label><br>
                <input type="text" id="apellido" name="apellido" required><br>

                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email" required><br>
                
                <label for="edad">Edad:</label><br>
                <textarea id="edad" name="edad" required></textarea><br>
               
                <label for="curso de interes">Curso de interés:</label><br>
                <textarea id="curso de interes" name="curso de interes" required></textarea><br>

                <label for="turno preferido">Turno preferido:</label><br>
                <select id="turno preferido" name="turno preferido" required>
                    <option value="mañana">Mañana</option>
                    <option value="tarde">Tarde</option>
                </select><br>

                <label for="aceptación de condiciones">Comentario:</label> <br>

                <button type="submit">Enviar</button><br>
            </form>
        </section>
        <br>
        <a href="index.html">Inicio</a>  
    </body>
</html>
